name: probe-browser
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install playwright httpx
      - run: playwright install --with-deps chromium
      - run: python probe_browser.py
        env:
          SPOT_SUPABASE_SERVICE_KEY: ${{ secrets.SPOT_SUPABASE_SERVICE_KEY }}
