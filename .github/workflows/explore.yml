name: explore
on:
  workflow_dispatch:
jobs:
  explore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install playwright
      - run: playwright install --with-deps chromium
      - run: python explore_pagination.py
