name: probe-etimad
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install httpx
      - run: python probe_etimad.py
        env:
          SPOT_SUPABASE_SERVICE_KEY: ${{ secrets.SPOT_SUPABASE_SERVICE_KEY }}
