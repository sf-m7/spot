name: fetch-sample
on:
  workflow_dispatch:
jobs:
  sample:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install playwright httpx
      - run: playwright install --with-deps chromium
      - run: python fetch_sample.py
